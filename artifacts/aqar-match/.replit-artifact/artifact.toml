kind = "web"
previewPath = "/"
title = "عقارMatch"
version = "1.0.0"
id = "artifacts/aqar-match"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21729

[services.development]
run = "pnpm --filter @workspace/aqar-match run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/aqar-match", "run", "build" ]
publicDir = "artifacts/aqar-match/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21729"
BASE_PATH = "/"
